 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCAVENGER'S EXCHANGE • ATOMIC FIZZ CAPS</title>

  <!-- Same Pip-Boy style & CSP as main page (copy-paste your working one) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://www.gstatic.com https://www.googletagmanager.com https://api.phantom.app https://*.phantom.app https://wallet.phantom.app 'sha256-knV59OylGCMUSLMIdwmcnoLKGBWKJTQUzPHVIDUiduo=' 'sha256-GWgqL/UbutCqyqM3J9Gks3xvFmnFo1ORE0ufB/pTDi8=' 'sha256-RKPZWgvMlMXlDlyqgBTkFok8+J/6Dwd8uWypHc9RTq4=' 'sha256-ifhM87Ts8YPjA9BFs7MOrEywjqLlp0CZBKWaOppr1fE=' 'sha256-QZ2UtJkPyVaVpO87TjOtPsu5XUuzvb/kBvJrg3lPegQ=' 'sha256-ht4bn3PtoOPOPNMxHc97QDZz/8/D3tGE3jfXNxJ9b6s=';
    connect-src 'self' https://unpkg.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://atomicfizzcaps.xyz https://www.atomicfizzcaps.xyz https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://api.phantom.app https://*.phantom.app https://wallet.phantom.app wss: https://*;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;
    img-src 'self' data: https: blob:;
    font-src 'self' https://fonts.gstatic.com data:;
    media-src 'self' data: https:;
    object-src 'none';
    frame-src 'self';
    base-uri 'self';">

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/pipboy.css" />
  <link rel="stylesheet" href="/css/leaflet.css" /> <!-- optional if you want mini-map -->

  <style>
    body { background: #0a1f0a; color: #00ff41; font-family: 'VT323', monospace; margin: 0; padding: 0; }
    .exchange-container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      border: 2px solid #00ff41;
      background: rgba(0, 0, 0, 0.7);
    }
    h1 { text-align: center; text-shadow: 0 0 10px #00ff41; }
    .trade-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .trade-card {
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid #00ff41;
      padding: 15px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .trade-card:hover { box-shadow: 0 0 15px #00ff41; transform: translateY(-3px); }
    .trade-card h3 { margin: 0 0 10px; color: #00ff99; }
    .trade-card .price { font-size: 1.4em; color: #ffcc00; }
    .trade-card button {
      background: #00cc33;
      color: black;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9em;
    }
    .trade-card button:hover { background: #00ff66; }
    .new-trade-form { margin: 40px 0; padding: 20px; background: rgba(0, 255, 65, 0.08); border: 1px dashed #00ff41; }
  </style>
</head>
<body>

  <div class="exchange-container">
    <h1>SCAVENGER'S EXCHANGE</h1>
    <p style="text-align:center;">Post your trades • Buy from other wastelanders • Powered by Solana</p>

    <!-- Wallet status -->
    <div id="walletStatus" style="text-align:center; margin:20px 0;">
      <button id="connectWalletBtn">Connect Phantom Wallet</button>
      <span id="walletAddr"></span>
    </div>

    <!-- New trade form -->
    <div class="new-trade-form">
      <h2>Post a New Trade</h2>
      <form id="newTradeForm">
        <label>Item you offer:</label><br>
        <input type="text" id="offerItem" placeholder="e.g. 50 Stimpaks" required style="width:100%; padding:8px; margin:8px 0;" /><br>

        <label>Price (in FIZZ tokens):</label><br>
        <input type="number" id="price" min="0.01" step="0.01" placeholder="e.g. 0.5" required style="width:100%; padding:8px; margin:8px 0;" /><br>

        <label>Your message / description:</label><br>
        <textarea id="description" rows="3" placeholder="Fresh stimpaks, no rads..." style="width:100%; padding:8px;"></textarea><br>

        <button type="submit">Post Trade (sign tx)</button>
      </form>
    </div>

    <!-- Active trades list -->
    <h2>Active Trades</h2>
    <div id="tradeList" class="trade-list">
      <!-- Trades will be injected here -->
      <div class="trade-card">
        <h3>Loading trades...</h3>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/bs58@6.0.0/dist/index.min.js"></script>
  <script>
    const connectBtn = document.getElementById('connectWalletBtn');
    const walletAddrEl = document.getElementById('walletAddr');

    connectBtn.addEventListener('click', async () => {
      if (!window.solana || !window.solana.isPhantom) {
        alert('Phantom wallet not found. Please install it.');
        return;
      }

      try {
        await window.solana.connect();
        const addr = window.solana.publicKey.toBase58();
        walletAddrEl.textContent = `Connected: ${addr.slice(0,6)}...${addr.slice(-4)}`;
        connectBtn.disabled = true;
        loadTrades(); // load after connect
      } catch (err) {
        console.error(err);
        alert('Connection failed');
      }
    });

    // Load trades (mock / fetch from your API later)
    async function loadTrades() {
      const tradeList = document.getElementById('tradeList');
      tradeList.innerHTML = '<div class="trade-card"><h3>Mock Trade 1</h3><p>50 Stimpaks for 0.75 FIZZ</p><button>Buy</button></div>';
      // TODO: fetch('/api/trades') and render real list
    }

    // Post new trade (will require signing)
    document.getElementById('newTradeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!window.solana?.publicKey) {
        alert('Please connect wallet first');
        return;
      }

      const offer = document.getElementById('offerItem').value;
      const price = document.getElementById('price').value;
      const desc = document.getElementById('description').value;

      alert(`Trade posted!\nOffer: ${offer}\nPrice: ${price} FIZZ\nDesc: ${desc}\n\n(Real tx signing coming soon)`);
      // TODO: sign tx with Phantom → send to /api/post-trade
    });
  </script>
</body>
</html>
