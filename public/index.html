<body>

  <!-- BOOT SCREEN -->
  <div id="bootScreen" aria-hidden="false" class="boot-screen">
    <div class="boot-inner">

      <div id="bootPrompt" class="boot-prompt blink">PRESS ANY KEY TO ACTIVATE PIP-BOY INTERFACE ▌</div>

    <div class="pipboy-shell">

      <!-- ... rest of your UI ... -->
    </div>
  </div>

  <script src="/js/leaflet.js"></script>

  <!-- Marker icon path fix -->
  <script>
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({

  <!-- Boot activation - single, safe, and once-only -->
  <script>
    // Boot activation function
    function activateUI() {
      const boot = document.getElementById('bootScreen');
      const pip = document.getElementById('pipboyScreen');
      
      if (!boot || !pip) {
        console.error("Boot or PipBoy screen element missing!");
        return;
      }

      boot.style.display = 'none';
      pip.classList.remove('hidden');
      pip.setAttribute('aria-hidden', 'false');
      pip.style.display = 'block'; // Force visibility (safety)

      console.log("Pip-Boy activated!");

      // Force map resize after transition
      setTimeout(() => {
        if (window._map && typeof window._map.invalidateSize === 'function') {
          window._map.invalidateSize();
        }
      }, 300);
    }

    // Bind once (prevents duplicates / multiple triggers)
    if (!window._bootBound) {
      // Keydown listener (any key)
      window.addEventListener('keydown', () => {
        activateUI();
      }, { once: true });

      // Click listener on boot screen
      const bootScreen = document.getElementById('bootScreen');
      if (bootScreen) {
        bootScreen.addEventListener('click', () => {
          activateUI();
        }, { once: true });
      }

      window._bootBound = true;
    }
  </script>
