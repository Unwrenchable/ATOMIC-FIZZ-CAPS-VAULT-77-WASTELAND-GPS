<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ATOMIC FIZZ CAPS • WASTELAND GPS</title>

  <!-- Updated CSP: added fonts.googleapis.com to style-src -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net https://www.gstatic.com https://www.googletagmanager.com https://api.phantom.app https://*.phantom.app https://wallet.phantom.app 'sha256-knV59OylGCMUSLMIdwmcnoLKGBWKJTQUzPHVIDUiduo=';
    connect-src 'self' https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://atomicfizzcaps.xyz https://www.atomicfizzcaps.xyz https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://api.phantom.app https://*.phantom.app https://wallet.phantom.app wss:;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: https:;
    font-src 'self' https://fonts.gstatic.com;">

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon (fixed type) -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- === LOCAL LEAFLET (no CDN = no CSP issues) === -->
  <link rel="stylesheet" href="/css/leaflet.css" />

  <!-- Fonts (now allowed) -->
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <!-- Your Pip-Boy CSS -->
  <link rel="stylesheet" href="/css/pipboy.css" />
</head>
<body>

  <!-- BOOT SCREEN -->
  <div id="bootScreen" aria-hidden="false" class="boot-screen">
    <div class="boot-inner">
      <pre id="bootText"></pre>
      <div id="bootPrompt" class="boot-prompt blink">PRESS ANY KEY TO ACTIVATE PIP-BOY INTERFACE ▌</div>
    </div>
  </div>

  <!-- PIP-BOY SHELL (unchanged) -->
  <div id="pipboyScreen" class="hidden" aria-hidden="true">
    <!-- ... all your existing Pip-Boy UI code remains exactly the same ... -->
  </div>

  <!-- SCRIPTS -->

  <!-- Local Leaflet -->
  <script src="/js/leaflet.js"></script>

  <!-- IMPORTANT: Fix default marker icons path -->
  <script>
    // Prevents broken default markers (404 on marker-icon.png)
    delete L.Icon.Default.prototype._getIconUrl;

    L.Icon.Default.mergeOptions({
      iconRetinaUrl: '/images/marker-icon-2x.png',
      iconUrl: '/images/marker-icon.png',
      shadowUrl: '/images/marker-shadow.png'
    });
  </script>

  <!-- Solana libs (allowed by CSP) -->
  <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/bs58@6.0.0/dist/index.min.js"></script>

  <!-- Your scripts -->
  <script src="/js/boot.js"></script>
  <script src="/js/map-core.js"></script>
  <script src="/js/main.js"></script>

  <!-- UI wiring -->
  <script>
    (function(){
      // Your existing inline UI script
      const boot = document.getElementById('bootScreen');
      const pip = document.getElementById('pipboyScreen');
      function activateUI(){
        boot.style.display = 'none';
        pip.classList.remove('hidden');
        pip.setAttribute('aria-hidden','false');
        setTimeout(()=>{ if(window._map && typeof window._map.invalidateSize === 'function') window._map.invalidateSize(); }, 300);
        window.removeEventListener('keydown', onAnyKey);
      }
      function onAnyKey(){ activateUI(); }
      window.addEventListener('keydown', onAnyKey);
      boot.addEventListener('click', activateUI);

      const drawer = document.getElementById('bottom-drawer');
      const toggle = document.getElementById('drawer-toggle');
      function setDrawer(open){
        if(!drawer) return;
        drawer.classList.toggle('hidden', !open);
        drawer.setAttribute('aria-hidden', String(!open));
        setTimeout(()=>{ if(window._map && typeof window._map.invalidateSize === 'function') window._map.invalidateSize(); }, 260);
      }
      toggle && toggle.addEventListener('click', ()=> setDrawer(!drawer.classList.contains('hidden')));
      toggle && toggle.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setDrawer(!drawer.classList.contains('hidden')); } });

      const tabs = Array.from(document.querySelectorAll('.tab'));
      tabs.forEach(t => {
        t.addEventListener('click', ()=> {
          tabs.forEach(x=>x.classList.remove('active'));
          t.classList.add('active');
          if(t.dataset.panel === 'map') { setTimeout(()=>{ if(window._map) window._map.invalidateSize(); }, 200); }
        });
        t.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); t.click(); } });
      });

      document.getElementById('centerBtn')?.addEventListener('click', ()=>{ if(window._map) window._map.setView([36.039, -115.000], 12); });
      document.getElementById('recenterMojave')?.addEventListener('click', ()=>{ if(window._map) window._map.setView([35.0, -115.0], 9); });

      window.addEventListener('map-ready', ()=>{ setTimeout(()=>{ if(window._map) window._map.invalidateSize(); }, 200); });
    })();
  </script>

  <!-- Drawer panels -->
  <div id="bottom-drawer">
    <div class="drawer-tabs">
      <button data-tab="stats">Stats</button>
      <button data-tab="items">Items</button>
      <button data-tab="quests">Quests</button>
      <button data-tab="scavenger">Scavenger</button>
      <button data-tab="exchange">Exchange</button>
      <button data-tab="overseer">Overseer</button>
      <button data-tab="terminal">Terminal</button>
      <button data-tab="workshops">Workshops</button>
    </div>
    <div class="drawer-panels">
      <div id="panel-stats" class="panel"></div>
      <div id="panel-items" class="panel"></div>
      <div id="panel-quests" class="panel"></div>
      <div id="panel-scavenger" class="panel"></div>
      <div id="panel-exchange" class="panel"></div>
      <div id="panel-overseer" class="panel"></div>
      <div id="panel-terminal" class="panel"></div>
      <div id="panel-workshops" class="panel"></div>
    </div>
  </div>

</body>
</html>
